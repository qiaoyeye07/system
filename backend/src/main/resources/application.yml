server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flea_market?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:MySql_123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

app:
  jwt:
    secret: ${JWT_SECRET:flea-market-jwt-secret-key-minimum-256-bits-change-in-production}
    expiration-ms: 86400000
  upload:
    path: ./uploads
    allowed-extensions: jpg,jpeg,png,gif
    max-images-per-product: 3

logging:
  level:
    com.fleamarket: DEBUG
    org.springframework.security: DEBUG
